<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Level 2 - Task 5</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; }
        textarea { width: 100%; height: 150px; font-family: monospace; padding: 10px; box-sizing: border-box; }
        button { padding: 10px 20px; margin-top: 10px; cursor: pointer; background-color: #007bff; color: white; border: none; border-radius: 4px; }
        .result { margin-top: 15px; padding: 15px; border-radius: 4px; font-weight: bold; }
        .valid { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .invalid { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <h2>JSON row validator</h2>
    <p>Enter the text below to check the validity of the JSON format:</p>
    
    <textarea id="json-input" placeholder='Наприклад: {"name": "John", "age": 30}'></textarea>
    <br>
    <button onclick="checkJson()">Check</button>

    <div id="result-box" style="display: none;"></div>

    <script>
        function checkJson() {
            const inputString = document.getElementById('json-input').value.trim();
            const resultBox = document.getElementById('result-box');
            
            resultBox.style.display = "block";

            if (!inputString) {
                resultBox.className = "result invalid";
                resultBox.innerText = "Error: field is empty!";
                return;
            }

            try {
                JSON.parse(inputString);
                
                resultBox.className = "result valid";
                resultBox.innerText = "Valid JSON";
            } catch (error) {
                resultBox.className = "result invalid";
                resultBox.innerText = `Invalid JSON\nError details: ${error.message}`;
            }
        }
    </script>
</body>
</html>
